<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PNG 자동 크롭 Smart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="app">
  <header class="hero">
    <p class="brand">MiriCanvas AI Studio</p>
    <h1>PNG 자동 크롭 Smart</h1>
    <p>배열은 위치만 나누고, 각 칸의 객체는 서로 다른 비율로 독립 분석해 개별 타이트 크롭합니다.</p>
  </header>

  <section class="panel compact">
    <div class="preset-row">
      <label>
        배열 선택
        <select id="gridSelect">
          <option value="1">1개 이미지</option>
          <option value="2">2×2 · 4개</option>
          <option value="3" selected>3×3 · 9개</option>
          <option value="4">4×4 · 16개</option>
        </select>
      </label>

      <label>
        요소 분류
        <select id="assetType">
          <option value="icon">아이콘·이모티콘·캐릭터</option>
          <option value="illustration" selected>그 외 일러스트</option>
        </select>
      </label>

      <label>
        크롭 스타일
        <select id="cropStyle">
          <option value="safe">안전</option>
          <option value="balanced" selected>균형 · 추천</option>
          <option value="tight">타이트</option>
        </select>
      </label>
    </div>

    <div class="preset-card">
      <strong>현재 추천 설정</strong>
      <div id="presetSummary"></div>
      <button id="restorePreset" type="button">추천값으로 복원</button>
    </div>

    <details>
      <summary>세부 설정 조절</summary>
      <div class="settings">
        <label>여백(px)<input id="margin" type="number" min="0" max="100"></label>
        <label>배경 민감도<input id="tolerance" type="range" min="10" max="100"><output id="toleranceOut"></output></label>
        <label>부속물 병합 거리<input id="merge" type="range" min="0" max="40"><output id="mergeOut"></output></label>
        <label>알파 경계 기준<input id="alpha" type="range" min="1" max="80"><output id="alphaOut"></output></label>
        <label>출력 DPI
          <select id="dpi">
            <option value="120">120dpi</option>
            <option value="150">150dpi</option>
            <option value="300">300dpi</option>
          </select>
        </label>
        <label>출력 크기
          <select id="sizeMode">
            <option value="original">원본 크롭 크기 유지</option>
            <option value="auto" selected>규정 최소값만 보정</option>
            <option value="long3000">긴 변 3000px</option>
          </select>
        </label>
        <label class="check"><input id="removeBg" type="checkbox"> 불투명 배경 자동 제거</label>
        <label class="check"><input id="rulesMode" type="checkbox" checked> 미리캔버스 규정 검사</label>
      </div>
    </details>
  </section>

  <section class="panel">
    <label class="drop" id="dropZone" for="fileInput">
      <span>🖼️</span>
      <b>이미지를 드래그하거나 클릭해서 선택</b>
      <small>PNG, JPG, JPEG, WEBP · 여러 장 가능</small>
      <input id="fileInput" type="file" accept="image/png,image/jpeg,image/webp" multiple hidden>
    </label>
  </section>

  <section class="panel">
    <div class="head">
      <div><h2>업로드된 이미지</h2><span id="sourceCount">0장</span></div>
      <div><button id="sourceAll">전체 선택</button><button id="sourceNone">전체 해제</button><button id="sourceDelete" class="danger">선택 삭제</button></div>
    </div>
    <div id="sourceGrid" class="grid empty">이미지를 추가하면 미리보기가 표시됩니다.</div>
  </section>

  <section id="resultPanel" class="panel hidden">
    <div class="head">
      <div><h2>개별 타이트 크롭 결과</h2><span id="resultCount">0개</span></div>
      <div><button id="resultAll">전체 선택</button><button id="resultNone">전체 해제</button></div>
    </div>
    <p class="note">각 결과는 서로 다른 가로·세로 비율과 크기를 유지합니다. 체크무늬는 투명 영역입니다.</p>
    <div id="resultGrid" class="grid"></div>
  </section>

  <div class="bottom">
    <button id="process" class="primary">▶ 처리 시작</button>
    <button id="addFiles">＋ 파일 추가</button>
    <button id="downloadFiles" disabled>⬇ 선택 다운로드</button>
    <button id="downloadZip" disabled>📦 선택 ZIP</button>
    <button id="reset" class="danger">↻ 초기화</button>
  </div>
  <p id="status">이미지를 추가해주세요.</p>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="script.js"></script>
</body>
</html>
