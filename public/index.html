<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >
  <title>PNG 자동 크롭</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="container">
    <header class="hero">
      <p class="eyebrow">MiriCanvas AI Studio</p>
      <h1>PNG 자동 크롭</h1>
      <p class="description">
        3×3 합본 이미지를 업로드하면 각 요소를 분리해
        개별 PNG와 ZIP 파일로 저장합니다.
      </p>
    </header>

    <section class="card">
      <label class="upload-box" for="fileInput">
        <span class="upload-icon">📁</span>
        <strong>이미지를 선택하세요</strong>
        <span>PNG, JPG, JPEG, WEBP 지원</span>

        <input
          id="fileInput"
          type="file"
          accept="image/png,image/jpeg,image/webp"
        >
      </label>

      <div class="settings">
        <label>
          배열
          <select id="gridSelect">
            <option value="3">3×3</option>
            <option value="4">4×4</option>
            <option value="2">2×2</option>
          </select>
        </label>

        <label>
          여백
          <input
            id="marginInput"
            type="number"
            value="12"
            min="0"
            max="100"
          >
        </label>
      </div>

      <button id="cropButton" type="button">
        자동 크롭 시작
      </button>

      <p id="status" class="status">
        아직 선택된 파일이 없습니다.
      </p>
    </section>

    <section id="previewSection" class="card hidden">
      <h2>원본 미리보기</h2>
      <img id="sourcePreview" alt="업로드한 원본 이미지">
    </section>

    <section id="resultSection" class="card hidden">
      <div class="result-header">
        <h2>크롭 결과</h2>
        <button id="zipButton" type="button" disabled>
          ZIP 다운로드
        </button>
      </div>

      <div id="resultGrid" class="result-grid"></div>
    </section>
  </main>

  <canvas id="workCanvas" hidden></canvas>

  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"
  ></script>
  <script src="script.js"></script>
</body>
</html>
