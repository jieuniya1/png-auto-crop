<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PNG 자동 크롭</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="app">
  <header>
    <p class="eyebrow">MiriCanvas AI Studio</p>
    <h1>PNG 자동 크롭</h1>
    <p>이미지를 업로드하고 원하는 결과만 체크해 PNG 또는 ZIP으로 저장하세요.</p>
  </header>

  <section class="panel">
    <label id="dropZone" class="drop-zone" for="fileInput">
      <span class="icon">🖼️</span>
      <strong>이미지를 드래그하거나 클릭해서 선택</strong>
      <span>PNG, JPG, JPEG, WEBP · 여러 장 가능</span>
      <input id="fileInput" type="file" accept="image/png,image/jpeg,image/webp" multiple hidden>
    </label>

    <div class="settings">
      <label>배열 선택
        <select id="gridSelect">
          <option value="1">1개 이미지 · 전체 타이트 크롭</option>
          <option value="2">2×2 · 4개 요소</option>
          <option value="3" selected>3×3 · 9개 요소</option>
          <option value="4">4×4 · 16개 요소</option>
        </select>
      </label>
      <label>여백(px)
        <input id="marginInput" type="number" value="12" min="0" max="100">
      </label>
      <label>배경 감지 강도
        <input id="toleranceInput" type="range" value="42" min="10" max="100">
        <span id="toleranceValue">42</span>
      </label>
      <label class="inline-check">
        <input id="removeBackground" type="checkbox" checked>
        배경을 투명하게 처리
      </label>
    </div>
  </section>

  <section class="panel">
    <div class="section-head">
      <div><h2>업로드된 이미지</h2><span id="uploadCount" class="badge">0장</span></div>
      <div class="actions">
        <button id="sourceSelectAll">전체 선택</button>
        <button id="sourceClearAll">전체 해제</button>
        <button id="deleteSelectedSources" class="danger">선택 삭제</button>
      </div>
    </div>
    <div id="sourceGrid" class="grid empty">이미지를 추가하면 미리보기가 표시됩니다.</div>
  </section>

  <section id="resultPanel" class="panel hidden">
    <div class="section-head">
      <div><h2>크롭 결과</h2><span id="resultCount" class="badge">0개</span></div>
      <div class="actions">
        <button id="resultSelectAll">전체 선택</button>
        <button id="resultClearAll">전체 해제</button>
      </div>
    </div>
    <div id="resultGrid" class="grid"></div>
  </section>

  <div class="bottom-bar">
    <button id="processButton" class="primary">▶ 처리 시작</button>
    <button id="chooseFolderButton">📁 저장 폴더 선택</button>
    <button id="addFilesButton">＋ 파일 추가</button>
    <button id="downloadSelectedButton" disabled>⬇ 선택 다운로드</button>
    <button id="downloadZipButton" disabled>📦 선택 ZIP</button>
    <button id="resetButton" class="danger">↻ 초기화</button>
  </div>
  <p id="status" class="status">이미지를 추가해주세요.</p>
</main>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="script.js"></script>
</body>
</html>
