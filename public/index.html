<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PNG 자동 크롭</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f7f9;
      color: #222;
    }

    main {
      width: min(760px, calc(100% - 32px));
      margin: 60px auto;
      padding: 40px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
    }

    .upload-box {
      margin-top: 30px;
      padding: 50px 20px;
      border: 2px dashed #aeb5bf;
      border-radius: 16px;
      text-align: center;
    }

    input {
      margin-top: 16px;
    }

    button {
      width: 100%;
      margin-top: 24px;
      padding: 16px;
      border: 0;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main>
    <h1>PNG 자동 크롭</h1>
    <p>3×3 합본 이미지를 올리면 각 요소를 분리하고 ZIP 파일로 저장합니다.</p>

    <div class="upload-box">
      <strong>이미지를 선택하세요</strong><br>
      <input id="fileInput" type="file" accept="image/png,image/jpeg,image/webp">
    </div>

    <button id="cropButton" type="button">자동 크롭 시작</button>

    <p id="status">아직 선택된 파일이 없습니다.</p>
  </main>

  <script>
    const fileInput = document.getElementById("fileInput");
    const cropButton = document.getElementById("cropButton");
    const status = document.getElementById("status");

    fileInput.addEventListener("change", () => {
      status.textContent = fileInput.files.length
        ? `선택한 파일: ${fileInput.files[0].name}`
        : "아직 선택된 파일이 없습니다.";
    });

    cropButton.addEventListener("click", () => {
      if (!fileInput.files.length) {
        alert("먼저 이미지를 선택해주세요.");
        return;
      }

      status.textContent = "홈페이지 연결 테스트가 정상적으로 작동합니다.";
    });
  </script>
</body>
</html>
